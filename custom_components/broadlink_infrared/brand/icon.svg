<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="ir" x1="80" y1="60" x2="200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E94560"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="device" x1="60" y1="120" x2="196" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Broadlink device body -->
  <rect x="68" y="130" width="120" height="70" rx="16" fill="url(#device)" stroke="#E94560" stroke-width="2"/>
  <!-- Device LED dot -->
  <circle cx="128" cy="152" r="6" fill="#E94560" opacity="0.9"/>
  <circle cx="128" cy="152" r="3" fill="#FF6B6B"/>
  <!-- IR signal waves emanating upward -->
  <path d="M 108 120 Q 128 90 148 120" stroke="url(#ir)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 96 108 Q 128 68 160 108" stroke="url(#ir)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 84 96 Q 128 46 172 96" stroke="url(#ir)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Small antenna/emitter nub on top of device -->
  <rect x="122" y="118" width="12" height="16" rx="4" fill="#0F3460" stroke="#E94560" stroke-width="1.5"/>
  <!-- Broadlink text hint - small dots pattern on device -->
  <circle cx="100" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
  <circle cx="112" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
  <circle cx="124" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
  <circle cx="136" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
  <circle cx="148" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
  <circle cx="160" cy="175" r="2.5" fill="#E94560" opacity="0.4"/>
</svg>
